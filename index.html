<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">

<title>Alltech Biomassa — Formulário de Campo</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#C55628">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" href="./icon-192.png">
<style>
  :root {
    --bg: #F7F7F5;
    --surface: #FFFFFF;
    --surface-2: #F0F0ED;
    --border: #E1DFDB;
    --border-strong: #CBC9C4;
    --text: #1A1A1A;
    --text-secondary: #5C5B57;
    --text-muted: #8D8C87;
    --accent-900: #3D1A0C;
    --accent-700: #7A331A;
    --accent-600: #C55628;
    --accent-100: #F7E3D8;
    --amber-700: #7A5710;
    --amber-600: #BD8A25;
    --amber-100: #F5EAD1;
    --green-700: #1F5E33;
    --green-600: #2E8B47;
    --green-100: #E1F2E5;
    --blue-700: #1D4E7A;
    --blue-600: #2E76B8;
    --blue-100: #DEEAF5;
    --red-600: #B33F3F;
    --red-700: #7A2424;
    --red-100: #F6DEDE;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    --radius: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #131313; --surface: #1D1D1D; --surface-2: #242422;
      --border: #333331; --border-strong: #46443F;
      --text: #F2F2EF; --text-secondary: #B7B6B0; --text-muted: #86857F;
      --accent-900: #F6DFCE; --accent-700: #E3A97E; --accent-600: #D2814B; --accent-100: #3A2417;
      --amber-700: #EFD68C; --amber-600: #D9B662; --amber-100: #3A311A;
      --green-700: #B7E3C4; --green-600: #5FBE7C; --green-100: #1B3323;
      --blue-700: #B9D8EF; --blue-600: #6BA8DC; --blue-100: #1B2C3A;
      --red-600: #DB7F7F;
      --red-700: #F0B0B0;
      --red-100: #3A1F1F;
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); }
  body { font-family: var(--sans); color: var(--text); font-size: 15px; line-height: 1.45; }
  #shell { max-width: 440px; margin: 0 auto; min-height: 100vh; background: var(--bg); display: flex; flex-direction: column; position: relative; }

  .bar { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--surface); }
  .bar-back { border: none; background: none; color: var(--text); font-size: 20px; line-height: 1; cursor: pointer; padding: 4px 6px 4px 0; }
  .bar-title { font-size: 16px; font-weight: 600; flex: 1; }
  .conn-pill { font-size: 11px; padding: 3px 8px; border-radius: 99px; font-weight: 500; white-space: nowrap; }
  .conn-online { background: var(--green-100); color: var(--green-700); }
  .conn-offline { background: var(--amber-100); color: var(--amber-700); }

  #content { flex: 1; overflow-y: auto; padding: 16px; }

  .logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .logo-row img { height: 24px; width: auto; }
  .logo-row span { font-size: 13px; color: var(--text-muted); }

  .visit-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; cursor: pointer; }
  .visit-card .vname { font-size: 15px; font-weight: 600; }
  .visit-card .vmeta { font-size: 12.5px; color: var(--text-secondary); margin-top: 2px; }
  .visit-card .vprogress { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
  .visit-card .vtrack { flex: 1; height: 5px; border-radius: 99px; background: var(--surface-2); overflow: hidden; }
  .visit-card .vtrack > span { display: block; height: 100%; background: var(--accent-600); }
  .visit-card .vpct { font-size: 11.5px; color: var(--text-secondary); font-family: var(--mono); }
  .sync-tag { font-size: 10.5px; padding: 2px 7px; border-radius: 99px; font-weight: 500; margin-top: 8px; display: inline-block; }
  .sync-rascunho { background: var(--blue-100); color: var(--blue-700); }
  .sync-pendente { background: var(--amber-100); color: var(--amber-700); }
  .sync-sincronizado { background: var(--green-100); color: var(--green-700); }

  .btn-primary { width: 100%; padding: 13px; border-radius: var(--radius); border: none; background: var(--accent-600); color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; }
  .btn-primary:active { opacity: 0.85; }
  .btn-secondary { width: 100%; padding: 12px; border-radius: var(--radius); border: 1px solid var(--border-strong); background: var(--surface); color: var(--text); font-size: 14px; font-weight: 500; cursor: pointer; }

  .visit-header { margin-bottom: 14px; }
  .visit-header .vname { font-size: 18px; font-weight: 600; }
  .visit-header .vmeta { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
  .overall-progress { display: flex; align-items: center; gap: 8px; margin: 12px 0 16px; }
  .overall-progress .track { flex: 1; height: 6px; border-radius: 99px; background: var(--surface-2); overflow: hidden; }
  .overall-progress .track > span { display: block; height: 100%; background: var(--accent-600); }
  .overall-progress .lbl { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }

  .section-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 4px; border-top: 1px solid var(--border); cursor: pointer; }
  .section-row:first-child { border-top: none; }
  .section-row .left { display: flex; align-items: center; gap: 10px; }
  .status-dot { width: 9px; height: 9px; border-radius: 99px; flex-shrink: 0; }
  .status-done { background: var(--green-600); }
  .status-partial { background: var(--amber-600); }
  .status-pending { background: var(--text-muted); opacity: 0.5; }
  .section-row .stitle { font-size: 14.5px; }
  .section-row .sright { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); }
  .chev { color: var(--text-muted); font-size: 16px; }

  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12.5px; color: var(--text-secondary); margin-bottom: 5px; }
  .field input[type="text"], .field input[type="number"], .field input[type="date"], .field input[type="time"], .field textarea {
    width: 100%; padding: 11px 12px; border-radius: 10px; border: 1px solid var(--border-strong);
    background: var(--surface); color: var(--text); font-size: 15px; font-family: var(--sans);
  }
  .field textarea { min-height: 72px; resize: vertical; }
  .unit-wrap { position: relative; }
  .unit-wrap input { padding-right: 46px; }
  .unit-suffix { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-size: 12.5px; color: var(--text-muted); pointer-events: none; }
  .toggle-group { display: flex; gap: 8px; }
  .toggle-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border-strong); background: var(--surface); color: var(--text-secondary); font-size: 14px; font-weight: 500; cursor: pointer; text-align: center; }
  .toggle-btn.active-yes { background: var(--green-100); color: var(--green-700); border-color: var(--green-600); }
  .toggle-btn.active-no { background: var(--text); color: var(--bg); border-color: var(--text); }
  .toggle-btn.active-pick { background: var(--accent-100); color: var(--accent-700); border-color: var(--accent-600); }
  .range-row { display: flex; align-items: center; gap: 10px; }
  .range-row input[type="range"] { flex: 1; }
  .range-val { font-family: var(--mono); font-size: 14px; min-width: 52px; text-align: right; }
  .photo-slot { display: flex; align-items: center; gap: 10px; padding: 10px; border: 1px dashed var(--border-strong); border-radius: 10px; cursor: pointer; }
  .photo-slot-enviada .thumb { background: var(--green-100); color: var(--green-600); font-size: 18px; }
  .photo-slot-enviada { border-style: solid; border-color: var(--green-600); }
  .photo-slot .thumb { width: 44px; height: 44px; border-radius: 8px; background: var(--surface-2); flex-shrink: 0; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--text-muted); }
  .photo-slot .ptext { font-size: 13.5px; color: var(--text-secondary); }

  .picker-btn { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 11px 12px; border-radius: 10px; border: 1px solid var(--border-strong); background: var(--surface); color: var(--text); font-size: 15px; font-family: var(--sans); cursor: pointer; text-align: left; }
  .picker-btn .ph { color: var(--text-muted); }
  .picker-btn:disabled { opacity: 0.55; cursor: not-allowed; }
  .field-note { font-size: 11.5px; color: var(--text-muted); margin-top: 4px; }

  .gps-box { border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
  .gps-result { font-family: var(--mono); font-size: 13px; margin-top: 10px; color: var(--text-secondary); }
  .gps-result b { color: var(--text); }
  .gps-error { font-size: 12.5px; color: var(--red-600); margin-top: 8px; }
  .gps-success { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--green-700); background: var(--green-100); border-radius: 8px; padding: 7px 10px; margin-top: 10px; }
  .gps-warning { font-size: 11.5px; color: var(--amber-700); background: var(--amber-100); border-radius: 8px; padding: 7px 10px; margin-top: 8px; }

  .save-toast { position: absolute; left: 0; right: 0; bottom: 82px; text-align: center; font-size: 11.5px; color: var(--green-700); opacity: 0; transition: opacity 0.4s; pointer-events: none; z-index: 15; }
  .save-toast.show { opacity: 1; }
  .section-footer { margin-top: 10px; padding-bottom: 24px; display: flex; flex-direction: column; gap: 8px; }

  /* picker overlay (bottom sheet) */
  .picker-overlay { position: fixed; inset: 0; max-width: 440px; margin: 0 auto; background: rgba(0,0,0,0.4); display: flex; align-items: flex-end; z-index: 20; }
  .picker-sheet { width: 100%; max-height: 78%; background: var(--surface); border-radius: 16px 16px 0 0; display: flex; flex-direction: column; }
  .picker-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 8px; font-size: 15px; font-weight: 600; flex-shrink: 0; }
  .picker-close { border: none; background: var(--surface-2); color: var(--text-secondary); width: 28px; height: 28px; border-radius: 99px; font-size: 15px; cursor: pointer; }
  .picker-search-wrap { padding: 4px 16px 10px; flex-shrink: 0; }
  .picker-search-wrap input { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border-strong); background: var(--surface-2); font-size: 15px; }
  .picker-list { overflow-y: auto; padding: 0 8px 16px; }
  .picker-item { display: block; width: 100%; text-align: left; padding: 12px 10px; border: none; background: none; font-size: 14.5px; color: var(--text); cursor: pointer; border-radius: 8px; }
  .picker-item:active, .picker-item.hover { background: var(--surface-2); }
  .picker-empty { padding: 20px 10px; color: var(--text-muted); font-size: 13.5px; text-align: center; }

  /* resumo da pontuação */
  .resumo-pontuacao { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-radius: var(--radius); margin-bottom: 16px; }
  .resumo-total { font-family: var(--mono); font-size: 26px; font-weight: 700; }
  .resumo-total small { font-size: 12.5px; font-weight: 400; opacity: 0.75; }
  .resumo-label { font-size: 13.5px; font-weight: 600; }
  .resumo-ruim { background: var(--red-100); color: var(--red-700); }
  .resumo-boa { background: var(--amber-100); color: var(--amber-700); }
  .resumo-otima { background: var(--green-100); color: var(--green-700); }

  /* calendario customizado */
  .cal-nav { display: flex; align-items: center; justify-content: space-between; padding: 4px 16px 10px; }
  .cal-nav button { border: none; background: var(--surface-2); width: 32px; height: 32px; border-radius: 99px; font-size: 16px; cursor: pointer; color: var(--text); }
  .cal-nav span { font-size: 14.5px; font-weight: 600; }
  .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 11.5px; color: var(--text-muted); padding: 0 12px; margin-bottom: 4px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; padding: 0 10px 16px; }
  .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border: none; background: none; border-radius: 99px; font-size: 14px; color: var(--text); cursor: pointer; }
  .cal-day.today { box-shadow: inset 0 0 0 1px var(--accent-600); }
  .cal-day.selected { background: var(--accent-600); color: #fff; }

  /* seletor de horario customizado */
  .time-cols { display: flex; gap: 8px; padding: 0 12px 12px; height: 220px; }
  .time-col { flex: 1; overflow-y: auto; border-radius: 10px; background: var(--surface-2); }
  .time-col button { display: block; width: 100%; padding: 9px; border: none; background: none; font-size: 15px; font-family: var(--mono); color: var(--text); cursor: pointer; text-align: center; }
  .time-col button.selected { background: var(--accent-600); color: #fff; border-radius: 8px; }
  .time-footer { padding: 4px 16px 16px; }

  /* confirmacao e sucesso */
  .confirm-overlay { position: fixed; inset: 0; max-width: 440px; margin: 0 auto; background: rgba(0,0,0,0.42); display: flex; align-items: center; justify-content: center; z-index: 30; padding: 24px; }
  .confirm-card { background: var(--surface); border-radius: 16px; padding: 20px; max-width: 320px; width: 100%; text-align: center; }
  .confirm-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
  .confirm-msg { font-size: 13.5px; color: var(--text-secondary); margin-bottom: 18px; }
  .confirm-actions { display: flex; gap: 8px; }
  .confirm-actions button { flex: 1; }

  .success-overlay { position: fixed; inset: 0; max-width: 440px; margin: 0 auto; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 40; text-align: center; padding: 24px; }
  .success-icon { width: 62px; height: 62px; border-radius: 99px; background: var(--green-100); color: var(--green-600); display: flex; align-items: center; justify-content: center; font-size: 30px; margin-bottom: 16px; animation: successPop 0.3s ease; }
  .pending-icon { width: 62px; height: 62px; border-radius: 99px; background: var(--amber-100); color: var(--amber-700); display: flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 16px; animation: successPop 0.3s ease; }
  @keyframes successPop { from { transform: scale(0.55); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .success-title { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
  .success-msg { font-size: 13.5px; color: var(--text-secondary); max-width: 280px; }

  /* header e footer fixos */
  .bar-brand { display: flex; align-items: center; gap: 8px; flex: 1; }
  .bar-brand img { height: 20px; width: auto; }
  .bar-brand span { font-size: 13.5px; color: var(--text-muted); }
  .footer-bar { flex-shrink: 0; padding: 12px 16px 16px; background: var(--bg); }
  .install-banner { display: flex; align-items: center; justify-content: space-between; gap: 10px; background: var(--accent-100); color: var(--accent-700); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 12px; font-size: 12.5px; }
  .install-banner span { flex: 1 1 auto; min-width: 0; }
  .install-banner button { width: auto; flex-shrink: 0; padding: 8px 14px; font-size: 13px; white-space: nowrap; }
</style>
</head>
<body>
<div id="shell">
  <div class="bar" id="bar"></div>
  <div id="content"></div>
  <div class="footer-bar" id="footerBar"></div>
  <div class="save-toast" id="toast">Salvo no dispositivo</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  // Config do Supabase — a chave pública é feita pra ficar exposta no
  // código do cliente (é protegida por Row Level Security no banco, não
  // por sigilo). Nunca coloque a chave "secret" aqui.
  var SUPABASE_URL = "https://xtwjvdwolxkkgecaamaf.supabase.co";
  var SUPABASE_PUBLISHABLE_KEY = "sb_publishable_BSTRWaomYin2vankhrJyXg_iAr4Wr8X";
  var supabaseClient = (typeof supabase !== "undefined")
    ? supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY)
    : null;

  // Captura o evento de instalação o quanto antes (fora da IIFE principal,
  // pra não perder o evento caso ele dispare antes do resto do script
  // carregar). O Chrome/Brave modernos não mostram mais o banner de
  // instalação sozinhos — é o app quem precisa pedir, com um botão próprio.
  window.deferredInstallPrompt = null;
  window.addEventListener("beforeinstallprompt", function (e) {
    e.preventDefault();
    window.deferredInstallPrompt = e;
    window.dispatchEvent(new Event("appInstallReady"));
  });
  window.addEventListener("appinstalled", function () {
    window.deferredInstallPrompt = null;
    window.dispatchEvent(new Event("appInstallReady"));
  });
</script>

  // ---------------------------------------------------------------------
  // IndexedDB — persistência real. Cada alteração de campo grava aqui,
  // não só na memória. Sobrevive a fechar o navegador, matar o app,
  // ficar sem internet e reabrir depois.
  // ---------------------------------------------------------------------
  var DB_NOME = "AlltechBiomassaDB";
  var DB_VERSAO = 1;
  var db = null;

  function abrirBanco() {
    return new Promise(function (resolve) {
      if (!("indexedDB" in window)) { resolve(null); return; }
      var pedido;
      try { pedido = indexedDB.open(DB_NOME, DB_VERSAO); } catch (e) { resolve(null); return; }
      pedido.onupgradeneeded = function (evt) {
        var banco = evt.target.result;
        if (!banco.objectStoreNames.contains("visitas")) {
          banco.createObjectStore("visitas", { keyPath: "id" });
        }
      };
      pedido.onsuccess = function (evt) { resolve(evt.target.result); };
      pedido.onerror = function () { resolve(null); };
    });
  }

  function persistir(visita) {
    if (!db || !visita) return;
    try {
      var tx = db.transaction("visitas", "readwrite");
      tx.objectStore("visitas").put(visita);
    } catch (e) { /* falha silenciosa — o dado ainda fica na memória da sessão atual */ }
  }

  function excluirDoBanco(id) {
    if (!db) return;
    try {
      var tx = db.transaction("visitas", "readwrite");
      tx.objectStore("visitas").delete(id);
    } catch (e) {}
  }

  function carregarTodasDoBanco() {
    return new Promise(function (resolve) {
      if (!db) { resolve([]); return; }
      try {
        var tx = db.transaction("visitas", "readonly");
        var pedido = tx.objectStore("visitas").getAll();
        pedido.onsuccess = function () { resolve(pedido.result || []); };
        pedido.onerror = function () { resolve([]); };
      } catch (e) { resolve([]); }
    });
  }

  // ---------------------------------------------------------------------
  // Sincronização com o Supabase — chama a função sincronizar_visita(jsonb)
  // que grava nas 8 tabelas relacionadas numa transação só, no servidor.
  // ---------------------------------------------------------------------
  function gerarUUID() {
    if (typeof crypto !== "undefined" && crypto.randomUUID) return crypto.randomUUID();
    return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function (c) {
      var r = (Math.random() * 16) | 0, v = c === "x" ? r : (r & 0x3) | 0x8;
      return v.toString(16);
    });
  }

  // ---------------------------------------------------------------------
  // Compressão de foto no dispositivo — reduz de ~3-8MB (direto da câmera)
  // pra ~150-400KB, sem perda visível pra documentação de campo. Essencial
  // pra sincronizar em 3G fraco.
  // ---------------------------------------------------------------------
  function comprimirImagem(arquivo, dimensaoMax, qualidade) {
    return new Promise(function (resolve, reject) {
      if (typeof Image === "undefined" || typeof document.createElement("canvas").getContext !== "function") {
        resolve(arquivo);
        return;
      }
      var url = URL.createObjectURL(arquivo);
      var img = new Image();
      img.onload = function () {
        URL.revokeObjectURL(url);
        var escala = Math.min(1, dimensaoMax / Math.max(img.width, img.height));
        var canvas = document.createElement("canvas");
        canvas.width = Math.max(1, Math.round(img.width * escala));
        canvas.height = Math.max(1, Math.round(img.height * escala));
        var ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        canvas.toBlob(function (blob) {
          if (blob) resolve(blob); else reject(new Error("Falha ao comprimir imagem"));
        }, "image/jpeg", qualidade);
      };
      img.onerror = function () { URL.revokeObjectURL(url); reject(new Error("Falha ao carregar imagem")); };
      img.src = url;
    });
  }

  // ---------------------------------------------------------------------
  // Upload das fotos pro bucket "evidencias" do Storage. Cada foto falha
  // de forma independente — se uma não subir, as outras e o resto dos
  // dados da visita seguem normalmente.
  // ---------------------------------------------------------------------
  var TIPO_EVIDENCIA_MAP = {
    foto_entrada: "entrada_fazenda",
    foto_sede: "sede",
    foto_area_disponivel: "area_disponivel",
    foto_plantio: "plantio_existente",
    foto_estradas: "estradas_acesso",
    foto_panoramica: "foto_panoramica"
  };
  var TIPO_EVIDENCIA_MAP_REVERSO = {};
  Object.keys(TIPO_EVIDENCIA_MAP).forEach(function (k) { TIPO_EVIDENCIA_MAP_REVERSO[TIPO_EVIDENCIA_MAP[k]] = k; });

  function enviarFotos(visita) {
    var chaves = Object.keys(visita.fotos).filter(function (k) { return !!visita.fotos[k]; });
    if (!chaves.length || !supabaseClient) return Promise.resolve({ enviadas: [], falhas: [] });
    var envios = chaves.map(function (k) {
      var tipo = TIPO_EVIDENCIA_MAP[k];
      if (!tipo) return Promise.resolve({ ok: false, k: k, tipo: k, erro: "tipo de evidência sem mapeamento" });
      var caminho = visita.uuid_dispositivo + "/" + tipo + ".jpg";
      return supabaseClient.storage.from("evidencias").upload(caminho, visita.fotos[k], { upsert: true, contentType: "image/jpeg" })
        .then(function (res) {
          if (res.error) {
            console.warn("Falha ao enviar foto '" + tipo + "':", res.error.message || res.error);
            return { ok: false, k: k, tipo: tipo, erro: res.error.message || String(res.error) };
          }
          return { ok: true, k: k, tipo: tipo, path: caminho };
        })
        .catch(function (err) {
          console.warn("Erro de rede ao enviar foto '" + tipo + "':", err);
          return { ok: false, k: k, tipo: tipo, erro: err && err.message ? err.message : "erro de rede" };
        });
    });
    return Promise.all(envios).then(function (resultados) {
      return {
        enviadas: resultados.filter(function (r) { return r.ok; }).map(function (r) { return { tipo: r.tipo, path: r.path }; }),
        falhas: resultados.filter(function (r) { return !r.ok; })
      };
    });
  }

  function montarPayloadSync(visita, evidencias) {
    var payload = {};
    Object.keys(visita.dados).forEach(function (k) { payload[k] = visita.dados[k]; });
    payload.uuid_dispositivo = visita.uuid_dispositivo;
    payload.gps_visita = visita.gps_visita || null;
    payload.evidencias = evidencias || [];
    return payload;
  }

  function sincronizarVisita(visita) {
    if (!supabaseClient) return Promise.reject(new Error("Cliente Supabase não carregado."));
    if (!visita.uuid_dispositivo) visita.uuid_dispositivo = gerarUUID();
    return enviarFotos(visita).then(function (resultadoFotos) {
      return supabaseClient.rpc("sincronizar_visita", { p: montarPayloadSync(visita, resultadoFotos.enviadas) })
        .then(function (resp) {
          resp.falhasFotos = resultadoFotos.falhas;
          return resp;
        });
    });
  }

  function tentarSincronizarPendentes() {
    var online = typeof navigator !== "undefined" && navigator.onLine !== false;
    if (!online || !supabaseClient) return;
    visitas.filter(function (v) { return v.status === "pendente" || (v.fotosPendentes && v.fotosPendentes.length); }).forEach(function (v) {
      sincronizarVisita(v).then(function (resp) {
        if (!resp.error) {
          v.status = "sincronizado";
          v.fotosPendentes = (resp.falhasFotos || []).map(function (f) { return f.k; });
          persistir(v);
          if (state.tela === "home") renderHome();
        }
      }).catch(function () { /* continua pendente — tenta de novo na próxima reconexão */ });
    });
  }

  // Reconstrói uma visita no formato que o app usa localmente, a partir

  // ---------------------------------------------------------------------
  var CAMPOS_FORA_DE_DADOS = { uuid_dispositivo: 1, status_sincronizacao: 1, atualizado_em: 1, gps_visita: 1, evidencias: 1 };

  function reconstruirVisitaDoServidor(registro) {
    var dados = {};
    Object.keys(registro).forEach(function (k) {
      if (CAMPOS_FORA_DE_DADOS[k]) return;
      if (registro[k] !== null && registro[k] !== undefined) dados[k] = registro[k];
    });
    var evidenciasServidor = (registro.evidencias || [])
      .map(function (e) { return TIPO_EVIDENCIA_MAP_REVERSO[e.tipo]; })
      .filter(Boolean);
    return {
      id: proximoId++,
      fazenda: registro.nome_fazenda || "Visita recuperada",
      municipio: registro.municipio || "",
      status: registro.status_sincronizacao === "sincronizado" ? "sincronizado" : "pendente",
      dados: dados,
      fotos: {},
      gps_visita: registro.gps_visita || null,
      uuid_dispositivo: registro.uuid_dispositivo,
      evidenciasServidor: evidenciasServidor,
      fotosPendentes: []
    };
  }

  // Busca todas as visitas já sincronizadas no banco e adiciona ao
  // dispositivo as que ainda não existem localmente — nunca sobrescreve
  // uma visita que já está no aparelho, pra não perder progresso feito
  // localmente e ainda não enviado.
  // ---------------------------------------------------------------------
  function buscarVisitasDoServidor() {
    var online = typeof navigator !== "undefined" && navigator.onLine !== false;
    if (!online || !supabaseClient) return Promise.resolve();
    return supabaseClient.rpc("listar_visitas").then(function (resp) {
      if (resp.error || !resp.data) return;
      var idsLocais = {};
      visitas.forEach(function (v) { if (v.uuid_dispositivo) idsLocais[v.uuid_dispositivo] = true; });
      var novas = resp.data.filter(function (r) { return r.uuid_dispositivo && !idsLocais[r.uuid_dispositivo]; });
      if (!novas.length) return;
      novas.forEach(function (r) {
        var nova = reconstruirVisitaDoServidor(r);
        visitas.push(nova);
        persistir(nova);
      });
      if (state.tela === "home") renderHome();
    }).catch(function () { /* falha silenciosa — tenta de novo na próxima abertura/reconexão */ });

  function preenchidos(secao) {
    var visita = visitaAtual();
    var total = secao.campos.filter(function (c) { return c.t !== "gps" && c.t !== "resumo"; }).length;
    var ok = 0;
    secao.campos.forEach(function (c) {
      if (c.t === "gps" || c.t === "resumo") return;
      var v = visita.dados[c.k];
      if (c.t === "photo") { if (visita.fotos[c.k] || (visita.evidenciasServidor && visita.evidenciasServidor.indexOf(c.k) !== -1)) ok++; return; }
      if (c.t === "toggle") { if (v === true || v === false) ok++; return; }
      if (v !== undefined && v !== null && v !== "") ok++;
    });
    return { ok: ok, total: total };
  }

  function statusSecao(secao) {
    var p = preenchidos(secao);
    if (p.total === 0 || p.ok === 0) return "pending";
    if (p.ok === p.total) return "done";
    return "partial";
  }

  function progressoGeral() {
    var ok = 0, total = 0;
    SECOES.forEach(function (s) { var p = preenchidos(s); ok += p.ok; total += p.total; });
    return { ok: ok, total: total, pct: total ? Math.round((ok / total) * 100) : 0 };
  }

    SECOES.forEach(function (s) {
      var st = statusSecao(s);
      var p = preenchidos(s);
      var label = st === "done" ? "Completo" : st === "partial" ? p.ok + "/" + p.total : "Pendente";
      html += '<div class="section-row" data-id="' + s.id + '">' +
        '<div class="left"><span class="status-dot status-' + st + '"></span><span class="stitle">' + s.titulo + '</span></div>' +
        '<div class="sright">' + label + '<span class="chev">›</span></div>' +
        '</div>';
    });
    content.innerHTML = html;
    document.querySelectorAll(".section-row").forEach(function (el) {
      el.onclick = function () { state.secaoAtual = el.getAttribute("data-id"); state.tela = "secaoDetalhe"; render(); };

    footerBar.innerHTML = '<button class="btn-primary" id="concluirVisita">Concluir e enviar visita</button>';
    document.getElementById("concluirVisita").onclick = function () {
      var p = progressoGeral();
      function enviar() {
        var online = typeof navigator !== "undefined" && navigator.onLine !== false;
        if (!online || !supabaseClient) {
          visita.status = "pendente";
          persistir(visita);
          mostrarPendente("A visita foi salva no dispositivo e entrará na fila de sincronização assim que a internet voltar.");
          return;
        }
        sincronizarVisita(visita).then(function (resp) {
          if (resp.error) {
            visita.status = "pendente";
            persistir(visita);
            mostrarPendente("Não foi possível sincronizar agora (" + resp.error.message + "). A visita ficou salva no dispositivo e o app tenta de novo automaticamente.");
            return;
          }
          visita.status = "sincronizado";
          var falhas = resp.falhasFotos || [];
          visita.fotosPendentes = falhas.map(function (f) { return f.k; });
          persistir(visita);
          if (falhas.length) {
            var lista = falhas.map(function (f) { return f.tipo + " (" + f.erro + ")"; }).join(" · ");
            mostrarPendente("Os dados foram sincronizados, mas " + falhas.length + " foto(s) não subiram: " + lista + ". O app tenta reenviar automaticamente.");
          } else {
            mostrarSucesso("A visita foi enviada e sincronizada com o banco de dados.");
          }
        }).catch(function () {
          visita.status = "pendente";
          persistir(visita);
          mostrarPendente("Sem conexão com o servidor agora. A visita ficou salva no dispositivo e o app tenta de novo automaticamente.");
        });
      }
      if (p.ok < p.total) {
        abrirConfirmacao(
          "Visita incompleta",
          "Faltam " + (p.total - p.ok) + " de " + p.total + " campos para preencher. Deseja enviar mesmo assim?",
          "Enviar mesmo assim",
          enviar
        );
      } else {
        enviar();
      }
    };
  }

  // ---------------------------------------------------------------------
  // mascara de CPF/CNPJ
  // ---------------------------------------------------------------------
  function aplicarMascaraDoc(raw, tipo) {
    var d = raw.replace(/\D/g, "");
    if (tipo === "CNPJ") {
      d = d.slice(0, 14);
      var out = d;
      out = out.replace(/^(\d{2})(\d)/, "$1.$2");
      out = out.replace(/^(\d{2}\.\d{3})(\d)/, "$1.$2");
      out = out.replace(/^(\d{2}\.\d{3}\.\d{3})(\d)/, "$1/$2");
      out = out.replace(/^(\d{2}\.\d{3}\.\d{3}\/\d{4})(\d)/, "$1-$2");
      return out;
    }
    d = d.slice(0, 11);
    var out2 = d;
    out2 = out2.replace(/^(\d{3})(\d)/, "$1.$2");
    out2 = out2.replace(/^(\d{3}\.\d{3})(\d)/, "$1.$2");
    out2 = out2.replace(/^(\d{3}\.\d{3}\.\d{3})(\d)/, "$1-$2");
    return out2;
  }

  // ---------------------------------------------------------------------
  // mascara de telefone/WhatsApp — (DD) XXXXX-XXXX (celular) ou (DD) XXXX-XXXX (fixo)
  // ---------------------------------------------------------------------
  function aplicarMascaraTelefone(raw) {
    var d = raw.replace(/\D/g, "").slice(0, 11);
    if (!d.length) return "";
    if (d.length <= 2) return "(" + d;
    var ddd = d.slice(0, 2), resto = d.slice(2);
    if (resto.length <= 4) return "(" + ddd + ") " + resto;
    if (d.length <= 10) return "(" + ddd + ") " + resto.slice(0, 4) + "-" + resto.slice(4);
    return "(" + ddd + ") " + resto.slice(0, 5) + "-" + resto.slice(5);
  }

  // confirmacao (bottom sheet centralizado) e tela de sucesso
  // ---------------------------------------------------------------------
  // ---------------------------------------------------------------------
  // Mantém os overlays (seletor, confirmação, sucesso) colados na área
  // realmente visível da tela — sem isso, quando o teclado do celular
  // abre, o overlay continua com o tamanho de antes do teclado abrir e
  // fica parcialmente "escondido" atrás dele, obrigando a rolar pra ver.
  // ---------------------------------------------------------------------
  function acompanharTeclado(overlay) {
    if (!window.visualViewport) return;
    function ajustar() {
      if (!document.body.contains(overlay)) {
        window.visualViewport.removeEventListener("resize", ajustar);
        window.visualViewport.removeEventListener("scroll", ajustar);
        return;
      }
      overlay.style.height = window.visualViewport.height + "px";
      overlay.style.top = window.visualViewport.offsetTop + "px";
    }
    window.visualViewport.addEventListener("resize", ajustar);
    window.visualViewport.addEventListener("scroll", ajustar);
    ajustar();
  }

  function abrirConfirmacao(titulo, msg, textoConfirmar, aoConfirmar) {
    var overlay = document.createElement("div");
    overlay.className = "confirm-overlay";
    overlay.innerHTML =
      '<div class="confirm-card">' +
        '<div class="confirm-title">' + titulo + '</div>' +
        '<div class="confirm-msg">' + msg + '</div>' +
        '<div class="confirm-actions">' +
          '<button type="button" class="btn-secondary" id="confCancelar">Cancelar</button>' +
          '<button type="button" class="btn-primary" id="confOk">' + textoConfirmar + '</button>' +
        '</div>' +
      '</div>';
    shell.appendChild(overlay);
    acompanharTeclado(overlay);
    overlay.querySelector("#confCancelar").onclick = function () { overlay.remove(); };
    overlay.querySelector("#confOk").onclick = function () { overlay.remove(); aoConfirmar(); };
  }

  function mostrarSucesso(msg) {
    var overlay = document.createElement("div");
    overlay.className = "success-overlay";
    overlay.innerHTML =
      '<div class="success-icon">✓</div>' +
      '<div class="success-title">Enviado com sucesso</div>' +
      '<div class="success-msg">' + msg + '</div>';
    shell.appendChild(overlay);
    acompanharTeclado(overlay);
    setTimeout(function () {
      overlay.remove();
      state.tela = "home";
      render();
    }, 1800);
  }

  function mostrarPendente(msg) {
    var overlay = document.createElement("div");
    overlay.className = "success-overlay";
    overlay.innerHTML =
      '<div class="pending-icon">↻</div>' +
      '<div class="success-title">Salvo — será enviado depois</div>' +
      '<div class="success-msg">' + msg + '</div>' +
      '<button type="button" class="btn-secondary" id="fecharPendente" style="margin-top:16px;width:auto;padding:8px 20px">OK</button>';
    shell.appendChild(overlay);
    acompanharTeclado(overlay);
    function fechar() {
      clearTimeout(timer);
      overlay.remove();
      state.tela = "home";
      render();
    }
    overlay.querySelector("#fecharPendente").onclick = fechar;
    var timer = setTimeout(fechar, 6000);
  }

  // ---------------------------------------------------------------------
  // picker (bottom sheet) — substitui o <select> nativo do navegador
  // ---------------------------------------------------------------------
  function abrirPicker(titulo, opcoes, valorAtual, onEscolher) {
    var overlay = document.createElement("div");
    overlay.className = "picker-overlay";
    overlay.innerHTML =
      '<div class="picker-sheet">' +
        '<div class="picker-header"><span>' + titulo + '</span><button class="picker-close">✕</button></div>' +
        '<div class="picker-search-wrap"><input type="text" placeholder="Buscar…" id="pickerSearch"></div>' +
        '<div class="picker-list" id="pickerList"></div>' +
      '</div>';
    shell.appendChild(overlay);
    acompanharTeclado(overlay);
    var listEl = overlay.querySelector("#pickerList");
    var searchEl = overlay.querySelector("#pickerSearch");
    function renderLista(filtro) {
      var f = (filtro || "").toLocaleLowerCase("pt-BR");
      var filtradas = !f ? opcoes : opcoes.filter(function (o) { return o.toLocaleLowerCase("pt-BR").indexOf(f) !== -1; });
      if (!filtradas.length) { listEl.innerHTML = '<div class="picker-empty">Nenhum resultado</div>'; return; }
      listEl.innerHTML = filtradas.map(function (o) {
        return '<button type="button" class="picker-item" data-v="' + o.replace(/"/g, "&quot;") + '">' + o + (o === valorAtual ? " ✓" : "") + '</button>';
      }).join("");
      listEl.querySelectorAll(".picker-item").forEach(function (btn) {
        btn.onclick = function () {
          onEscolher(btn.getAttribute("data-v"));
          fechar();
        };
      });
    }
    function fechar() { overlay.remove(); }
    overlay.querySelector(".picker-close").onclick = fechar;
    overlay.onclick = function (e) { if (e.target === overlay) fechar(); };
    searchEl.oninput = function () { renderLista(searchEl.value); };
    renderLista("");
    searchEl.focus();
  }

  var MESES_PT = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

  function formatarDataBR(iso) {
    var p = iso.split("-");
    return p[2] + "/" + p[1] + "/" + p[0];
  }

  function renderCalGrid(gridEl, labelEl, ano, mes, valorAtual, onPick) {
    labelEl.textContent = MESES_PT[mes] + " " + ano;
    var primeiro = new Date(ano, mes, 1);
    var offset = primeiro.getDay();
    var diasNoMes = new Date(ano, mes + 1, 0).getDate();
    var hojeStr = new Date().toISOString().slice(0, 10);
    var html = "";
    for (var i = 0; i < offset; i++) html += "<span></span>";
    for (var d = 1; d <= diasNoMes; d++) {
      var dstr = ano + "-" + String(mes + 1).padStart(2, "0") + "-" + String(d).padStart(2, "0");
      var cls = "cal-day" + (dstr === hojeStr ? " today" : "") + (dstr === valorAtual ? " selected" : "");
      html += '<button type="button" class="' + cls + '" data-d="' + dstr + '">' + d + '</button>';
    }
    gridEl.innerHTML = html;
    gridEl.querySelectorAll(".cal-day").forEach(function (btn) {
      btn.onclick = function () { onPick(btn.getAttribute("data-d")); };
    });
  }

  function abrirPickerData(valorAtual, onEscolher) {
    var base = valorAtual ? new Date(valorAtual + "T00:00:00") : new Date();
    var viewYear = base.getFullYear(), viewMonth = base.getMonth();
    var overlay = document.createElement("div");
    overlay.className = "picker-overlay";
    overlay.innerHTML =
      '<div class="picker-sheet">' +
        '<div class="picker-header"><span>Selecionar data</span><button class="picker-close">✕</button></div>' +
        '<div class="cal-nav"><button type="button" id="calPrev">‹</button><span id="calLabel"></span><button type="button" id="calNext">›</button></div>' +
        '<div class="cal-weekdays"><span>D</span><span>S</span><span>T</span><span>Q</span><span>Q</span><span>S</span><span>S</span></div>' +
        '<div class="cal-grid" id="calGrid"></div>' +
      '</div>';
    shell.appendChild(overlay);
    acompanharTeclado(overlay);
    var gridEl = overlay.querySelector("#calGrid");
    var labelEl = overlay.querySelector("#calLabel");
    function fechar() { overlay.remove(); }
    function desenhar() {
      renderCalGrid(gridEl, labelEl, viewYear, viewMonth, valorAtual, function (dstr) { onEscolher(dstr); fechar(); });
    }
    overlay.querySelector(".picker-close").onclick = fechar;
    overlay.onclick = function (e) { if (e.target === overlay) fechar(); };
    overlay.querySelector("#calPrev").onclick = function () { viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; } desenhar(); };
    overlay.querySelector("#calNext").onclick = function () { viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; } desenhar(); };
    desenhar();
  }

  function abrirPickerHora(valorAtual, onEscolher) {
    var partes = (valorAtual || "").split(":");
    var hSel = partes[0] || null, mSel = partes[1] || null;
    var horas = []; for (var h = 0; h < 24; h++) horas.push(String(h).padStart(2, "0"));
    var minutos = []; for (var m = 0; m < 60; m += 5) minutos.push(String(m).padStart(2, "0"));
    var overlay = document.createElement("div");
    overlay.className = "picker-overlay";
    overlay.innerHTML =
      '<div class="picker-sheet">' +
        '<div class="picker-header"><span>Selecionar horário</span><button class="picker-close">✕</button></div>' +
        '<div class="time-cols">' +
          '<div class="time-col" id="colH">' + horas.map(function (hh) { return '<button type="button" data-h="' + hh + '" class="' + (hh === hSel ? "selected" : "") + '">' + hh + '</button>'; }).join("") + '</div>' +
          '<div class="time-col" id="colM">' + minutos.map(function (mm) { return '<button type="button" data-m="' + mm + '" class="' + (mm === mSel ? "selected" : "") + '">' + mm + '</button>'; }).join("") + '</div>' +
        '</div>' +
        '<div class="time-footer"><button type="button" class="btn-primary" id="timeConfirmar">Confirmar</button></div>' +
      '</div>';
    shell.appendChild(overlay);
    acompanharTeclado(overlay);
    function fechar() { overlay.remove(); }
    overlay.querySelector(".picker-close").onclick = fechar;
    overlay.onclick = function (e) { if (e.target === overlay) fechar(); };
    overlay.querySelectorAll("#colH button").forEach(function (b) {
      b.onclick = function () { overlay.querySelectorAll("#colH button").forEach(function (x) { x.classList.remove("selected"); }); b.classList.add("selected"); hSel = b.getAttribute("data-h"); };
    });
    overlay.querySelectorAll("#colM button").forEach(function (b) {
      b.onclick = function () { overlay.querySelectorAll("#colM button").forEach(function (x) { x.classList.remove("selected"); }); b.classList.add("selected"); mSel = b.getAttribute("data-m"); };
    });
    overlay.querySelector("#timeConfirmar").onclick = function () {
      onEscolher((hSel || "00") + ":" + (mSel || "00"));
      fechar();
    };
    setTimeout(function () {
      var selH = overlay.querySelector("#colH .selected"); if (selH) selH.scrollIntoView({ block: "center" });
      var selM = overlay.querySelector("#colM .selected"); if (selM) selM.scrollIntoView({ block: "center" });
    }, 30);
  }

  function opcoesDoCampo(c) {
    if (c.dynamic === "municipios") {
      var estado = visitaAtual().dados.estado;
      if (!estado || !MUNICIPIOS_POR_ESTADO[estado]) return [];
      return MUNICIPIOS_POR_ESTADO[estado];
    }
    return c.opts || [];
  }

  function calcularPontuacao(visita) {
    var d = visita.dados;
    var total = (d.score_area || 0) + (d.score_interesse || 0) + (d.score_logistica || 0) + (d.score_producao || 0) + (d.score_ambiental || 0);
    var classe = total >= 80 ? { l: "Ótima", cls: "resumo-otima" } : total >= 70 ? { l: "Boa", cls: "resumo-boa" } : { l: "Ruim", cls: "resumo-ruim" };
    return { total: total, label: classe.l, cls: classe.cls };
  }

  function resumoPontuacaoHtml(visita) {
    var r = calcularPontuacao(visita);
    return '<div class="resumo-pontuacao ' + r.cls + '" id="resumoPontuacao">' +
      '<span class="resumo-total">' + r.total + '<small>/100</small></span>' +
      '<span class="resumo-label">Viabilidade ' + r.label + '</span>' +
      '</div>';
  }

  function atualizarResumoPontuacao() {
    var el = document.getElementById("resumoPontuacao");
    if (!el) return;
    var r = calcularPontuacao(visitaAtual());
    el.className = "resumo-pontuacao " + r.cls;
    el.innerHTML = '<span class="resumo-total">' + r.total + '<small>/100</small></span><span class="resumo-label">Viabilidade ' + r.label + '</span>';
  }

  function renderCampo(c) {
    var visita = visitaAtual();
    var v = visita.dados[c.k];
    if (!campoVisivel(c)) return "";
    var html = '<div class="field">';
    if (c.t !== "toggle" && c.t !== "photo" && c.t !== "gps" && c.t !== "choice2" && c.t !== "resumo") html += '<label>' + c.l + '</label>';
    if (c.t === "text") {
      html += '<input type="text" placeholder="' + (c.ph || "") + '" value="' + (v || "").toString().replace(/"/g, "&quot;") + '" data-k="' + c.k + '"' + (c.mask ? ' data-mask="' + c.mask + '"' : '') + '>';
    } else if (c.t === "doc") {
      var tipo = visita.dados.tipo_documento;
      var ph = tipo === "CNPJ" ? "00.000.000/0000-00" : tipo === "CPF" ? "000.000.000-00" : "selecione o tipo acima";
      html += '<input type="text" inputmode="numeric" placeholder="' + ph + '" value="' + (v || "").toString().replace(/"/g, "&quot;") + '" data-k="' + c.k + '"' + (tipo ? "" : " disabled") + '>';
      if (!tipo) html += '<div class="field-note">Escolha CPF ou CNPJ acima para liberar a máscara.</div>';
    } else if (c.t === "number") {
      html += '<div class="unit-wrap"><input type="number" inputmode="decimal" value="' + (v == null ? "" : v) + '" data-k="' + c.k + '">' + (c.u ? '<span class="unit-suffix">' + c.u + '</span>' : '') + '</div>';
    } else if (c.t === "date") {
      html += '<button type="button" class="picker-btn" data-k="' + c.k + '"><span class="' + (v ? "" : "ph") + '">' + (v ? formatarDataBR(v) : "Selecionar data") + '</span><span class="chev">›</span></button>';
    } else if (c.t === "time") {
      html += '<button type="button" class="picker-btn" data-k="' + c.k + '"><span class="' + (v ? "" : "ph") + '">' + (v || "Selecionar horário") + '</span><span class="chev">›</span></button>';
    } else if (c.t === "select") {
      var op = opcoesDoCampo(c);
      var travado = c.dynamic === "municipios" && !visita.dados.estado;
      html += '<button type="button" class="picker-btn" data-k="' + c.k + '"' + (travado ? " disabled" : "") + '>' +
        '<span class="' + (v ? "" : "ph") + '">' + (v || (travado ? "Selecione o estado primeiro" : "Selecionar…")) + '</span><span class="chev">›</span></button>';
    } else if (c.t === "textarea") {
      html += '<textarea data-k="' + c.k + '">' + (v || "") + '</textarea>';
    } else if (c.t === "toggle") {
      html += '<label>' + c.l + '</label><div class="toggle-group">' +
        '<button class="toggle-btn ' + (v === true ? "active-yes" : "") + '" data-k="' + c.k + '" data-v="true">Sim</button>' +
        '<button class="toggle-btn ' + (v === false ? "active-no" : "") + '" data-k="' + c.k + '" data-v="false">Não</button>' +
        '</div>';
    } else if (c.t === "choice2") {
      html += '<label>' + c.l + '</label><div class="toggle-group">' +
        c.opts.map(function (o) {
          return '<button class="toggle-btn ' + (v === o ? "active-pick" : "") + '" data-k="' + c.k + '" data-v="' + o + '">' + o + '</button>';
        }).join("") + '</div>';
    } else if (c.t === "range") {
      var val = v == null ? 0 : v;
      html += '<div class="range-row"><input type="range" min="0" max="' + c.max + '" step="1" value="' + val + '" data-k="' + c.k + '">' +
        '<span class="range-val">' + val + '/' + c.max + '</span></div>';
    } else if (c.t === "photo") {
      var fotoBlob = visita.fotos[c.k];
      var has = !!fotoBlob;
      var jaEnviada = !has && visita.evidenciasServidor && visita.evidenciasServidor.indexOf(c.k) !== -1;
      var thumbUrl = has ? URL.createObjectURL(fotoBlob) : null;
      var thumbConteudo = has ? "" : jaEnviada ? "✓" : "＋";
      var texto = has ? " — capturada" : jaEnviada ? " — já enviada (toque para substituir)" : " — toque para tirar foto";
      html += '<div class="photo-slot' + (jaEnviada ? " photo-slot-enviada" : "") + '" data-k="' + c.k + '">' +
        '<div class="thumb"' + (has ? ' style="background-image:url(' + thumbUrl + ')"' : '') + '">' + thumbConteudo + '</div>' +
        '<div class="ptext">' + c.l + texto + '</div>' +
        '<input type="file" accept="image/*" capture="environment" data-k="' + c.k + '" style="display:none">' +
        '</div>';
    } else if (c.t === "gps") {
      html += renderGpsBox(c);
    } else if (c.t === "resumo") {
      html += resumoPontuacaoHtml(visita);
    }
    html += '</div>';
    return html;
  }

  function renderGpsBox(c) {
    var visita = visitaAtual();
    var g = visita.gps_visita;
    var inseguro = typeof window.isSecureContext === "boolean" && window.isSecureContext === false;
    var html = '<label>' + c.l + '</label><div class="gps-box">' +
      '<button class="btn-secondary" id="btnGps">' + (g ? "Capturar novamente" : "Capturar localização") + '</button>';
    if (inseguro) {
      html += '<div class="gps-warning">Este arquivo foi aberto fora de um endereço seguro (https). Alguns navegadores bloqueiam o GPS nessa condição — a versão publicada do app não terá esse problema.</div>';
    }
    if (g) {
      html += '<div class="gps-success">✓ Localização capturada e válida</div>' +
        '<div class="gps-result"><b>' + g.lat.toFixed(5) + ', ' + g.lon.toFixed(5) + '</b><br>precisão ±' + Math.round(g.acc) + ' m · ' + new Date(g.quando).toLocaleTimeString("pt-BR") + '</div>';
    }
    html += '<div class="gps-error" id="gpsErro"></div></div>';
    return html;
  }

  function renderSecaoAtual() {
    if (state.tela !== "secaoDetalhe") return;
    var secao = SECOES.filter(function (s) { return s.id === state.secaoAtual; })[0];
    var html = "";
    secao.campos.forEach(function (c) { html += renderCampo(c); });
    content.innerHTML = html;
    wireCampoEvents();
    footerBar.innerHTML = '<button class="btn-primary" id="voltarSecoes">Voltar às seções</button>';
    document.getElementById("voltarSecoes").onclick = function () { state.tela = "secoes"; render(); };
  }

  function wireCampoEvents() {
    var visita = visitaAtual();

    content.querySelectorAll('input[type=text]:not([data-k=cpf_cnpj]):not([data-mask]), input[type=number], textarea').forEach(function (el) {
      el.oninput = function () {
        var k = el.getAttribute("data-k");
        var val = el.type === "number" ? (el.value === "" ? null : Number(el.value)) : el.value;
        setValSoft(k, val);
      };
    });

    var docInput = content.querySelector('input[data-k=cpf_cnpj]');
    if (docInput) {
      docInput.oninput = function () {
        var tipo = visita.dados.tipo_documento;
        var masked = aplicarMascaraDoc(docInput.value, tipo);
        docInput.value = masked;
        visita.dados.cpf_cnpj = masked;
        persistir(visita);
        showToast();
      };
    }

    content.querySelectorAll('input[data-mask=tel]').forEach(function (el) {
      el.oninput = function () {
        var masked = aplicarMascaraTelefone(el.value);
        el.value = masked;
        visita.dados[el.getAttribute("data-k")] = masked;
        persistir(visita);
        showToast();
      };
    });

    content.querySelectorAll(".picker-btn").forEach(function (btn) {
      if (btn.disabled) return;
      var k = btn.getAttribute("data-k");
      var campo = null;
      SECOES.forEach(function (s) { s.campos.forEach(function (c) { if (c.k === k) campo = c; }); });
      btn.onclick = function () {
        if (campo.t === "date") {
          abrirPickerData(visita.dados[k], function (val) { setVal(k, val); });
        } else if (campo.t === "time") {
          abrirPickerHora(visita.dados[k], function (val) { setVal(k, val); });
        } else {
          var opts = opcoesDoCampo(campo);
          abrirPicker(campo.l, opts, visita.dados[k], function (val) { setVal(k, val); });
        }
      };
    });

    content.querySelectorAll(".toggle-btn").forEach(function (el) {
      el.onclick = function () {
        var k = el.getAttribute("data-k");
        var raw = el.getAttribute("data-v");
        var val = raw === "true" ? true : raw === "false" ? false : raw;
        setVal(k, val);
      };
    });

    content.querySelectorAll("input[type=range]").forEach(function (el) {
      el.oninput = function () {
        visita.dados[el.getAttribute("data-k")] = Number(el.value);
        el.nextElementSibling.textContent = el.value + "/" + el.max;
        atualizarResumoPontuacao();
        persistir(visita);
        showToast();
      };
    });

    content.querySelectorAll(".photo-slot").forEach(function (el) {
      var input = el.querySelector("input[type=file]");
      el.onclick = function () { input.click(); };
      input.onchange = function () {
        if (!input.files || !input.files[0]) return;
        var k = input.getAttribute("data-k");
        var thumbEl = el.querySelector(".thumb");
        thumbEl.textContent = "…";
        comprimirImagem(input.files[0], 1600, 0.75).then(function (blobComprimido) {
          // guarda o arquivo já comprimido (Blob), não uma URL temporária —
          // isso é o que permite a foto sobreviver a um recarregamento, e
          // deixa o upload rápido mesmo com sinal fraco em campo.
          visita.fotos[k] = blobComprimido;
          persistir(visita);
          showToast();
          renderSecaoAtual();
        }).catch(function () {
          // se a compressão falhar por algum motivo, usa o arquivo original
          visita.fotos[k] = input.files[0];
          persistir(visita);
          showToast();
          renderSecaoAtual();
        });
      };
    });

    var btnGps = document.getElementById("btnGps");
    if (btnGps) {
      btnGps.onclick = function () {
        var erroEl = document.getElementById("gpsErro");
        erroEl.textContent = "";
        btnGps.textContent = "Obtendo localização…";
        if (!("geolocation" in navigator)) {
          erroEl.textContent = "Este dispositivo/navegador não expõe a API de localização.";
          btnGps.textContent = "Capturar localização";
          return;
        }
        navigator.geolocation.getCurrentPosition(
          function (pos) {
            visita.gps_visita = { lat: pos.coords.latitude, lon: pos.coords.longitude, acc: pos.coords.accuracy, quando: Date.now() };
            persistir(visita);
            showToast();
            renderSecaoAtual();
            wireCampoEvents();
          },
          function (err) {
            var msgs = { 1: "Permissão de localização negada. Verifique as permissões do site/app nas configurações do navegador.", 2: "Não foi possível determinar a posição agora (sinal de GPS fraco). Tente novamente ao ar livre.", 3: "Tempo esgotado tentando obter a localização. Tente novamente." };
            erroEl.textContent = msgs[err.code] || "Não foi possível obter a localização agora.";
            btnGps.textContent = "Capturar localização";
          },
          { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
        );
      };
    }
  }

  function setValSoft(k, v) {
    var visita = visitaAtual();
    visita.dados[k] = v;
    if (k === "nome_fazenda" && v) visita.fazenda = v;
    persistir(visita);
    showToast();
    var secao = SECOES.filter(function (s) { return s.id === state.secaoAtual; })[0];
    var dependentes = secao.campos.filter(function (c) { return c.showIf === k; });
    if (dependentes.length) renderSecaoAtual();
  }

  function render() {
    renderBar();
    if (state.tela === "home") renderHome();
    else if (state.tela === "secoes") renderSecoes();
    else renderSecaoAtual();
  }

  window.addEventListener("online", function () { renderBar(); tentarSincronizarPendentes(); buscarVisitasDoServidor(); });
  window.addEventListener("appInstallReady", function () { if (state.tela === "home") renderHome(); });
  window.addEventListener("offline", renderBar);

  // ---------------------------------------------------------------------
  // inicialização: abre o banco local e carrega o que já foi salvo antes.
  // ---------------------------------------------------------------------
  abrirBanco().then(function (banco) {
    db = banco;
    return carregarTodasDoBanco();
  }).then(function (salvas) {
    if (salvas && salvas.length) {
      visitas = salvas.sort(function (a, b) { return b.id - a.id; });
      proximoId = salvas.reduce(function (max, v) { return Math.max(max, v.id); }, 0) + 1;
      visitaAtualId = visitas.length ? visitas[0].id : null;
    }
    render();
    tentarSincronizarPendentes();
    buscarVisitasDoServidor();
  }).catch(function () {
    render();
  });
})();
</script>
<script>
  // Registra o Service Worker (só funciona em HTTPS ou localhost — em
  // file:// ou dentro de visualizadores como o do WhatsApp, isso falha
  // silenciosamente, o que é esperado e não quebra o resto do app).
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("./sw.js").catch(function (err) {
        console.warn("Service worker não registrado (normal em file:// ou sem HTTPS):", err);
      });
    });
  }
</script>
